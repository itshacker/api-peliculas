<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch</title>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">▶</span>
        <span class="logo-text">AulaCine</span>
      </div>
      <p class="tagline">Descubre las mejores películas del mundo</p>
    </div>
  </header>

  <section class="search-section">
    <div class="search-box">
      <input
        type="text"
        id="inputBusqueda"
        placeholder="Escribe el título de una película..."
        autocomplete="off"
      />
      <button id="btnBuscar">Buscar</button>
    </div>

    <div class="filtros">
    </div>

  <div id="mensajeCargando" class="mensaje-estado" style="display:none;">
    <div class="spinner"></div>
    <p>Buscando películas...</p>
  </div>

  <div id="mensajeError" class="mensaje-estado mensaje-error" style="display:none;">
    <span class="error-icon">✕</span>
    <p id="textoError">No se encontraron resultados.</p>
  </div>

  <section id="seccionClasicos">
    <div class="seccion-titulo">
      <span class="seccion-linea"></span>
      <h2>Clásicos imprescindibles</h2>
      <span class="seccion-linea"></span>
    </div>
    <div id="clasicos" class="grid-peliculas grid-clasicos"></div>
  </section>

  <section id="seccionResultados" style="display:none;">
    <div class="seccion-titulo">
      <span class="seccion-linea"></span>
      <h2 id="tituloResultados">Resultados</h2>
      <span class="seccion-linea"></span>
    </div>
    <main id="resultados" class="grid-peliculas"></main>
  </section>

  <div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-contenido">
      <button id="cerrarModal" class="btn-cerrar">✕</button>
      <div id="modalInterior"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
